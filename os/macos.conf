# dotfiles-MacBook/os/macos.conf  →  ~/.config/tmux/os.conf
# ──────────────────────────────────────────────────────────────────────────────
# macOS-specific tmux bits, sourced by Core's tmux.conf via:
#   source-file -q ~/.config/tmux/os.conf
# These are the values that DON'T travel: the network interface name and the
# laptop battery identifier the tokyo-night-tmux theme reads. On a Linux box the
# os.conf would set eth0/wlan0 and the appropriate battery (or disable it).
# ──────────────────────────────────────────────────────────────────────────────

# netspeed widget — primary interface on macOS laptops is en0
set -g @tokyo-night-tmux_show_netspeed       1
set -g @tokyo-night-tmux_netspeed_iface      "en0"
set -g @tokyo-night-tmux_netspeed_showip     1
set -g @tokyo-night-tmux_netspeed_refresh    1

# battery widget — internal battery identifier on macOS
set -g @tokyo-night-tmux_show_battery_widget  1
set -g @tokyo-night-tmux_battery_name         "InternalBattery-0"
set -g @tokyo-night-tmux_battery_low_threshold 21


# dotfiles-MacBook/os/macos.conf  →  ~/.config/tmux/os.conf
# ──────────────────────────────────────────────────────────────────────────────
# macOS-specific tmux bits, sourced by Core's tmux.conf via:
#   source-file -q ~/.config/tmux/os.conf
#
# WHAT CHANGED: the status line is now HAND-ROLLED (Core dropped the
# janoamaral/tokyo-night-tmux plugin), so the old `@tokyo-night-tmux_*` settings
# this file used to set are DEAD — nothing reads them anymore. The hand-rolled
# bar instead appends whatever this file puts in `@status_right_os` to the right
# side. Network/IP is already handled portably by core/tmux/scripts/tmux-netinfo.sh
# (it shows en0's IP here), so the only macOS-specific bit worth adding back is
# the laptop battery.
#
# @status_right_os may reference the @tn_*/@cap_* user options — Core's tmux.conf
# defines them before it sources this file, and the value is expanded at draw
# time, so the battery pill picks up the tokyonight palette automatically.
# ──────────────────────────────────────────────────────────────────────────────

# Battery pill: yellow normally; tmux-netinfo.sh already owns the IP segment.
# `pmset -g batt` → grab the first NN% it prints. Cheap at the 5s status-interval.
set -g @status_right_os " \
#[fg=#{@tn_yellow},bg=default]#{@cap_l}\
#[fg=#{@tn_bg},bg=#{@tn_yellow},bold] 󰁹 #(pmset -g batt | grep -Eo '[0-9]+%' | head -1) \
#[fg=#{@tn_yellow},bg=default]#{@cap_r}"

# If you ever want this Mac to also show CPU/temp or a different segment, append
# more pills to the string above — it's just the tail of status-right.

# dotfiles-MacBook/os/macos.conf  →  ~/.config/tmux/os.conf
# ──────────────────────────────────────────────────────────────────────────────
# macOS-specific tmux bits, sourced by Core's tmux.conf via:
#   source-file -q ~/.config/tmux/os.conf
#
# WHY THIS LOOKS DIFFERENT NOW: the previous version set @status_right_os to a
# string containing #{...} / #[...] / #(...) directives. tmux substitutes a
# #{@option} reference as a LITERAL string and does NOT re-expand directives
# inside it — so the bar showed raw `#{@cap_l}` and `#(pmset …)` text instead of
# output. The fix: APPEND the segment to status-right with `set -ga`. Appended
# text becomes part of the top-level status-right, which tmux expands normally
# (the exact path Core's IP pill `#(tmux-netinfo.sh)` already uses), so the
# option refs resolve, the styles apply, and the command runs.
#
# Core defines @tn_*/@cap_* and status-right BEFORE sourcing this file, so the
# references below resolve. Network/IP is handled portably by
# core/tmux/scripts/tmux-netinfo.sh (shows en0 here); the only macOS-specific
# addition worth making is the laptop battery.
#
# Reload-safe: `prefix + r` re-sources tmux.conf, which `set -g`-resets
# status-right before re-sourcing this file, so the append never stacks up.
# ──────────────────────────────────────────────────────────────────────────────

# Battery pill (yellow), appended after Core's clock/path/IP segments.
# `pmset -g batt` → first NN% it prints. Cheap at the 5s status-interval.
set -ga status-right " #[fg=#{@tn_yellow},bg=default]#{@cap_l}#[fg=#{@tn_bg},bg=#{@tn_yellow},bold] 󰁹 #(pmset -g batt | grep -Eo '[0-9]+%' | head -1) #[fg=#{@tn_yellow},bg=default]#{@cap_r}"

# Want more macOS-only segments (CPU, temp, etc.)? Append more pills the same way:
#   set -ga status-right " #[...]#{@cap_l}#[...] <glyph> #(your-command) #[...]#{@cap_r}"

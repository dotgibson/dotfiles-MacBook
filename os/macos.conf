# dotfiles-MacBook/os/macos.conf  →  ~/.config/tmux/os.conf
# ──────────────────────────────────────────────────────────────────────────────
# macOS-specific tmux bits, sourced by Core's tmux.conf via:
#   source-file -q ~/.config/tmux/os.conf
#
# Two lessons baked into this file:
#
# 1) APPEND, don't stuff into an option. A #{@option} reference is substituted
#    by tmux as a LITERAL string and the #{…}/#[…]/#(…) directives inside it are
#    NOT re-expanded — so they print verbatim. We therefore append the segment
#    to status-right with `set -ga`; appended text is top-level and expands
#    normally (the same path Core's IP pill #(tmux-netinfo.sh) uses).
#
# 2) KEEP '%' OUT OF THE CONF. tmux runs strftime %-expansion over status-right,
#    which corrupts a '%' sitting in an inline command (e.g. grep -Eo '[0-9]+%'),
#    making the battery read "0". All battery logic therefore lives in
#    core/tmux/scripts/tmux-battery.sh, invoked as a bare #() with no '%' here.
#
# Reload-safe: `prefix + r` re-sources tmux.conf, which `set -g`-resets
# status-right before re-sourcing this file, so the append never stacks up.
# ──────────────────────────────────────────────────────────────────────────────

# Battery pill — fully styled + colored by the script; emits nothing if the Mac
# has no battery (Mac mini / Studio / iMac), so the segment self-hides.
set -ga status-right " #(~/.config/tmux/scripts/tmux-battery.sh)"

# Add more macOS-only segments the same way (each as a self-contained script or
# a bare #() with NO % or $ in the conf string):
#   set -ga status-right " #(~/.config/tmux/scripts/your-segment.sh)"

# .github/workflows/bootstrap-test.yml
# ──────────────────────────────────────────────────────────────────────────────
# REUSABLE bootstrap integration test — authored once here, called by a thin stub
# in each OS repo (workflow_call) so the OS repos get CI WITHOUT each carrying a
# duplicated copy of this logic (the same fan-out the Core layer exists to kill).
#
# Two jobs:
#   1. lint        — shellcheck -x + bash -n + --help, on the runner (deterministic,
#                    no container). Catches the syntax/guard class of bug directly.
#   2. links-only  — run `bootstrap.sh --links-only` inside the target distro's
#                    container and assert the symlink graph + the generated ~/.zshrc.
#                    --links-only skips provision() (no package installs, no Gentoo
#                    source builds); the tpm dir is pre-seeded so its first-run clone
#                    is skipped (offline + deterministic). The actual zsh module LOAD
#                    is already covered hermetically by dotfiles-core's test-core.sh,
#                    so this asserts the part bootstrap.sh OWNS: the wiring it produces.
#
# A caller stub (in an OS repo) looks like — pinned to the moving MAJOR tag @vN per the
# `@vN` policy in RELEASE-STRATEGY.md, NOT @main: a caller's contract then changes only via
# a Core release, and a MAJOR bump (this v4 assertion switch) is the one intentional,
# reviewed caller edit — so an OS repo on @v3 keeps the v3 assertions until it deliberately
# moves to @v4 as part of the fan-out (re-vendoring v4 Core + updating its bootstrap together):
#   jobs:
#     test:
#       uses: dotgibson/dotfiles-core/.github/workflows/bootstrap-test.yml@v3
#       with:
#         image: alpine:3.20
#         prep:  apk add --no-cache bash zsh
#         offensive: false        # true only for dotfiles-Kali
# ──────────────────────────────────────────────────────────────────────────────
name: bootstrap-test

on:
  workflow_call:
    inputs:
      image:
        description: Container image for the target distro (matching /etc/os-release).
        type: string
        required: true
      prep:
        description: Shell run INSIDE the container to install bootstrap's deps (at least bash).
        type: string
        required: true
      offensive:
        description: Assert the Kali offensive role layer (offensive symlinks + loader stage).
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: shellcheck + syntax + --help
        run: |
          shellcheck -x bootstrap.sh
          bash -n bootstrap.sh
          bash bootstrap.sh --help >/dev/null

  links-only:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: bootstrap --links-only (${{ inputs.image }})
        env:
          IMAGE: ${{ inputs.image }}
          PREP: ${{ inputs.prep }}
          OFFENSIVE: ${{ inputs.offensive }}
        run: |
          # BLIB_SU= : the container runs as root, so no privilege escalation is
          # needed. Without this, blib_set_login_shell defaults BLIB_SU=sudo and a
          # distro whose image HAS chsh but NOT sudo (Arch/openSUSE/Kali base images)
          # would run `sudo chsh` and abort. Empty = run chsh/tee directly as root.
          # (Alpine/Gentoo bootstraps already export their own BLIB_SU; this is a no-op
          # there and the correct default for the rest.)
          docker run --rm -e PREP -e OFFENSIVE -e BLIB_SU= -v "$PWD:/repo" -w /repo "$IMAGE" sh -euc '
            # Install bootstrap deps, WITH RETRY: some distro mirrors (notably openSUSE
            # Tumbleweed OSS) intermittently time out in CI (curl error 28), and a single
            # prep failure should not red every fan-out PR fleet-wide. The until-condition
            # is exempt from set -e so a failed attempt loops instead of aborting; an `if`
            # (not `&&`) guards the cap for the same reason. After 5 tries we exit 1 so a
            # genuinely broken prep still fails LOUD (no false green).
            n=0
            until eval "$PREP"; do
              n=$((n+1))
              if [ "$n" -ge 5 ]; then echo "prep failed after $n attempts" >&2; exit 1; fi
              echo "prep attempt $n failed (mirror timeout?), retrying in $((n*10))s..." >&2
              sleep $((n*10))
            done
            # Pre-seed the tpm dir so blib_link_core skips its network git clone — the
            # same "seed the plugin dir to skip the first-run clone" trick test-core.sh
            # uses to stay offline + deterministic.
            mkdir -p "$HOME/.config/tmux/plugins/tpm"

            ./bootstrap.sh --links-only

            echo "── asserting symlink graph + generated ~/.zshrc ──"
            for link in \
              "$HOME/.config/zsh/loader.zsh" \
              "$HOME/.config/zsh/80-os.zsh" \
              "$HOME/.config/starship.toml" \
              "$HOME/.config/lazygit/config.yml" \
              "$HOME/.config/nvim" \
              "$HOME/.vimrc" \
              "$HOME/.gitconfig"; do
              if [ ! -L "$link" ]; then echo "MISSING symlink: $link" >&2; exit 1; fi
            done
            # The vendored loader must resolve to the repo copy (not a dangling link).
            if [ ! -e "$HOME/.config/zsh/loader.zsh" ]; then echo "loader.zsh symlink is dangling" >&2; exit 1; fi
            # sesh is SEEDED (copied, not symlinked) — assert the real file landed. Re-added now
            # that the lazygit/vim/sesh wiring is vendored fleet-wide (every adopter core.lock is
            # at a Core that includes it), so this @main test can assert it without false reds.
            if [ ! -f "$HOME/.config/sesh/sesh.toml" ]; then echo "sesh.toml not seeded" >&2; exit 1; fi
            if [ -L "$HOME/.config/sesh/sesh.toml" ]; then echo "sesh.toml should be a copy, not a symlink" >&2; exit 1; fi
            # NOTE: keep this block apostrophe-free — it lives inside the single-quoted sh -euc script.

            grep -q "dotfiles-managed v4" "$HOME/.zshrc" || { echo "~/.zshrc not managed" >&2; exit 1; }
            # v4: the .zshrc no longer lists modules — it just sources the vendored loader,
            # which globs the numbered fragments itself.
            grep -q "source .*loader.zsh" "$HOME/.zshrc" || { echo "~/.zshrc does not source the vendored loader" >&2; exit 1; }
            # It must NOT assign CORE_PROFILE (only mention it in a comment): the loader owns
            # resolution (env, else $ZSH_CFG/profile, else full), and a pre-set would disable
            # the profile file. Strip comment lines first, then reject any CORE_PROFILE= / :=.
            if grep -vE "^[[:space:]]*#" "$HOME/.zshrc" | grep -qE "CORE_PROFILE[[:space:]]*:?="; then
              echo "~/.zshrc must NOT assign CORE_PROFILE (v4 leaves resolution to the loader)" >&2; exit 1
            fi

            if [ "$OFFENSIVE" = "true" ]; then
              # v4: the offensive role stage is the numbered fragment 85-offensive.zsh (band
              # 85-94); the loader picks it up by NN glob (no module-list entry to grep).
              for link in "$HOME/.config/zsh/85-offensive.zsh" "$HOME/hacktheplanet"; do
                if [ ! -L "$link" ]; then echo "MISSING offensive symlink: $link" >&2; exit 1; fi
              done
            fi

            echo "bootstrap --links-only OK"
          '

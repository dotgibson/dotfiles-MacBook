name: core-integrity

# Per-repo core-guard: block a hand-edit to this repo's vendored core/ at PR time.
# Delegates to the reusable workflow in dotfiles-core (single definition of the
# content-addressed tree-SHA check); the central sweep there also catches drift
# weekly. The durable replacement for the un-versioned .git/hooks core-guard.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  guard:
    uses: Gerrrt/dotfiles-core/.github/workflows/core-integrity-call.yml@v2

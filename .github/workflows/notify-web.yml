# Thin caller for the reusable showcase-refresh dispatch authored in dotfiles-core
# (.github/workflows/notify-web-call.yml). The owner guard + curl-to-dotfiles-web live
# there (one definition for every source repo); this just names the trigger and forwards
# the secret.
#
# Setup: add a fine-grained PAT with "Contents: Read and write" on dotgibson/dotfiles-web
# as a repo secret named WEBHOOK_SECRET. Without it, the reusable job warns and skips.
name: Refresh showcase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    uses: dotgibson/dotfiles-core/.github/workflows/notify-web-call.yml@v3
    secrets:
      # Least privilege: pass ONLY the token the reusable workflow needs, not `inherit`
      # (which forwards every repo secret to the called workflow).
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}

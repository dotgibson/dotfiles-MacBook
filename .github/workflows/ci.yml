name: CI

# Static-analysis gate for the repo-owned shell + the workflow itself, plus a
# behavioral gate on the vendored Core layer. Dotfiles can't be unit-tested, so
# shellcheck + shfmt + `bash -n`/`zsh -n` ARE the suite for repo-owned files; the
# Core load-order + function tests (core/scripts/test-core.sh) catch the cross-
# module breakage a `git subtree pull` can introduce. core/ static findings are
# surfaced by a non-blocking advisory step (fixes land in dotfiles-core).

on:
  # De-duplicated triggers: a PR'd branch previously ran CI TWICE (the `push` and the
  # `pull_request` event fire for the same commit, and their github.ref differs so
  # concurrency didn't collapse them). Now `push` is scoped to the default branch + tags
  # (post-merge / release signal); everything else is gated by `pull_request`. Pure-docs
  # changes skip the shell suite via paths-ignore.
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENSE"

# Incremental CI: a newer push to the same ref cancels the in-flight run rather
# than letting a stale job burn minutes next to the fresh one.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Incremental CI: classify the changed paths so a core-only or repo-shell-only PR
  # doesn't pay the full matrix. FAIL-SAFE — if the diff base can't be resolved (first
  # push, force-push, shallow), or an infra path (.github/Makefile) changed, BOTH flags
  # are true and nothing downstream is skipped. (paths-ignore already drops pure-docs runs.)
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      core: ${{ steps.f.outputs.core }}
      shell: ${{ steps.f.outputs.shell }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the diff base resolves
      - id: f
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -uo pipefail
          base=""
          if [ "$EVENT" = pull_request ]; then
            git fetch -q origin "$BASE_REF" 2>/dev/null && base="origin/$BASE_REF" || base=""
          elif [ -n "${BEFORE:-}" ] && [ "$BEFORE" != 0000000000000000000000000000000000000000 ]; then
            base="$BEFORE"
          fi
          if [ -z "$base" ] || ! git rev-parse -q --verify "$base^{commit}" >/dev/null 2>&1; then
            echo "diff base unknown — running everything (safe default)"
            { echo "core=true"; echo "shell=true"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files="$(git diff --name-only "$base" HEAD)"
          echo "changed files vs $base:"; printf '%s\n' "$files" | sed 's/^/  /'
          core=false shell=false
          while IFS= read -r f; do
            [ -z "$f" ] || case "$f" in
            core/*) core=true ;;
            .github/* | Makefile) core=true shell=true ;; # infra → full (fail-safe)
            *.md | LICENSE) ;;                             # inert
            *) shell=true ;;                               # repo-owned shell/zsh/config
            esac
          done <<EOF
          $files
          EOF
          echo "→ core=$core shell=$shell"
          { echo "core=$core"; echo "shell=$shell"; } >> "$GITHUB_OUTPUT"

  shell:
    name: shell lint
    needs: changes
    # repo-owned lint + the core/ advisory; run when repo shell OR vendored core changed.
    if: needs.changes.outputs.shell == 'true' || needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    env:
      # shfmt is NOT a Core gate (Core deliberately doesn't enforce shfmt), so it has no
      # entry in the vendored tool-versions.env and stays a literal here.
      SHFMT_VERSION: "3.8.0"
    steps:
      - uses: actions/checkout@v4

      # Load the pinned linter versions from the VENDORED Core single source rather than
      # hardcoding them here — they had already drifted (this repo pinned actionlint 1.7.7
      # while Core moved to 1.7.8). SHELLCHECK_VERSION (+ others) now come from
      # core/scripts/tool-versions.env, so a Core bump propagates on the next subtree pull
      # instead of silently splitting "green in Core / red here". Must precede the cache
      # step below, which keys on $SHELLCHECK_VERSION.
      - name: Load pinned tool versions (vendored Core single source)
        run: grep -E '^[A-Z0-9_]+=' core/scripts/tool-versions.env >> "$GITHUB_ENV"

      # zsh is needed for `make zsh-syntax` + the repo behavioral tests (the repo-owned
      # zsh modules have no .sh extension, so the bash gate never reached them).
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Cache shellcheck (pinned)
        uses: actions/cache@v4
        with:
          path: /tmp/bin/shellcheck
          key: shellcheck-${{ env.SHELLCHECK_VERSION }}-linux-x86_64

      - name: Install shellcheck (pinned)
        run: |
          if [ ! -x /tmp/bin/shellcheck ]; then
            mkdir -p /tmp/bin
            curl -fsSL -o /tmp/sc.tar.xz \
              "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
            tar -xJf /tmp/sc.tar.xz -C /tmp \
              "shellcheck-v${SHELLCHECK_VERSION}/shellcheck"
            mv "/tmp/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" /tmp/bin/shellcheck
            chmod +x /tmp/bin/shellcheck
          fi
          sudo install -m 0755 /tmp/bin/shellcheck /usr/local/bin/shellcheck
          shellcheck --version

      # Cache the pinned shfmt binary so steady-state runs skip the release
      # download (keyed on the version → an upgrade busts the cache automatically).
      - name: Cache shfmt (pinned)
        uses: actions/cache@v4
        with:
          path: /tmp/bin/shfmt
          key: shfmt-${{ env.SHFMT_VERSION }}-linux-amd64

      - name: Install shfmt (pinned)
        run: |
          if [ ! -x /tmp/bin/shfmt ]; then
            mkdir -p /tmp/bin
            curl -fsSL -o /tmp/bin/shfmt \
              "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64"
            chmod +x /tmp/bin/shfmt
          fi
          sudo install -m 0755 /tmp/bin/shfmt /usr/local/bin/shfmt
          shfmt --version

      - name: shellcheck
        run: make shellcheck

      - name: shfmt (format check)
        run: make fmt-check

      - name: bash -n (syntax)
        run: make syntax

      - name: zsh -n (syntax)
        run: make zsh-syntax

      - name: repo behavioral tests (bootstrap, loader, defaults)
        run: make test-repo

      - name: core/ advisory (non-blocking)
        run: make core-advisory

  core-regression:
    name: core regression
    needs: changes
    if: needs.changes.outputs.core == 'true' # the vendored Core subtree (audit + behavioral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh + PyYAML
        # zsh drives the behavioral suite; python3-yaml lets the audit's YAML-parse gate
        # run for real instead of skipping (python3/tomllib/json are already on the runner).
        run: sudo apt-get update && sudo apt-get install -y zsh python3-yaml

      # Gate the VENDORED Core subtree with its own audit BEFORE the behavioral suite:
      # a `git subtree pull` can introduce manifest↔filesystem drift, a lost exec bit, a
      # zsh/bash syntax break, or a malformed toml/yaml/json — none of which `make test`
      # (load-order + function units) looks at. The shellcheck/luacheck/markdownlint/
      # actionlint/gitleaks/nvim sections skip gracefully here (those are gated in
      # dotfiles-core's own CI); this leg's job is to catch VENDORING drift, which the
      # manifest/exec-bit/syntax/config sections cover with just zsh + python.
      - name: Audit the vendored Core subtree (drift gate)
        run: make core-audit

      # Sources every Core zsh module in canonical order inside a hermetic shell
      # and exercises the pure functions (mkcd/cdup/mkbak/extract/…). Self-skips
      # the nvim sections (nvim not installed) and exits 0 on a bare box.
      - name: Core load-order + function tests
        run: make test

  # Byte-for-byte integrity of the vendored subtree against upstream @ the recorded
  # subtree-split commit — the backstop for drift the dir-granular manifest can't see
  # (a hand-edited or orphaned file inside a manifested directory). Needs full history so
  # the git-subtree-split marker resolves; skips gracefully if upstream is unreachable.
  verify-core:
    name: verify vendored core
    needs: changes
    if: needs.changes.outputs.core == 'true' # only meaningful when the subtree changed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the subtree commit history for the split marker
      - name: Verify vendored core/ == upstream @ subtree-split
        run: make verify-core

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ACTIONLINT_VERSION from the vendored Core single source (was a literal 1.7.7 here,
      # already behind Core's 1.7.8). Must precede the cache step, which keys on it.
      - name: Load pinned tool versions (vendored Core single source)
        run: grep -E '^[A-Z0-9_]+=' core/scripts/tool-versions.env >> "$GITHUB_ENV"

      - name: Cache actionlint (pinned)
        uses: actions/cache@v4
        with:
          path: /tmp/bin/actionlint
          key: actionlint-${{ env.ACTIONLINT_VERSION }}-linux-amd64

      - name: Install actionlint (pinned)
        run: |
          if [ ! -x /tmp/bin/actionlint ]; then
            mkdir -p /tmp/bin
            curl -fsSL -o /tmp/actionlint.tgz \
              "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
            tar -xzf /tmp/actionlint.tgz -C /tmp/bin actionlint
          fi
          sudo install -m 0755 /tmp/bin/actionlint /usr/local/bin/actionlint

      - name: actionlint
        run: actionlint -color

  # The lint/regression jobs above run on Ubuntu and never exercise the macOS
  # execution path — the exact surface this repo OWNS. This job runs the real macOS
  # code paths that Linux can't: the native clipboard (pbcopy/pbpaste), the Brewfile
  # parse, and bootstrap/defaults under a genuine Darwin uname. It is intentionally
  # install-free (no `brew bundle`, which would take many minutes) — it validates that
  # the entry points RUN on macOS, not that every package is present.
  macos:
    name: macos smoke
    needs: changes
    # Exercises the macOS entry points (bootstrap/clipboard/Brewfile) — relevant when repo
    # shell OR vendored core changed. Skipped for, e.g., a workflow-only or inert change.
    if: needs.changes.outputs.shell == 'true' || needs.changes.outputs.core == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Native clipboard round-trip: Core's clip/clip-paste shell out to pbcopy/pbpaste
      # on Darwin. Linux tests stub these, so a real-macOS quoting/exec bug in clip would
      # otherwise ship undetected. (clip lives in vendored core/, but it RUNS here.)
      - name: clipboard round-trip (pbcopy/pbpaste)
        run: |
          chmod +x core/bin/clip core/bin/clip-paste
          msg="dotfiles-ci-$RANDOM"
          printf '%s' "$msg" | core/bin/clip
          got="$(core/bin/clip-paste)"
          if [ "$got" != "$msg" ]; then
            echo "clipboard round-trip mismatch: wrote '$msg', read '$got'" >&2
            exit 1
          fi
          echo "clipboard round-trip OK ($msg)"

      # Parse the Brewfile with the real brew (preinstalled on the runner). Catches a
      # malformed Brewfile without the cost of installing every formula/cask.
      - name: Brewfile parses
        run: brew bundle list --file=Brewfile --all >/dev/null && echo "Brewfile OK"

      # Lock-drift gate (B2): once Brewfile.lock.json is committed, fail if it's out of
      # sync with the Brewfile. Until then, nudge to generate it (non-fatal) so the
      # documented reproducibility promise becomes real on the next `brew bundle`.
      - name: Brewfile.lock present / in sync
        run: |
          if [ -f Brewfile.lock.json ]; then
            brew bundle check --file=Brewfile --verbose || {
              echo "Brewfile.lock.json is out of sync — run 'brew bundle' and commit the lock" >&2
              exit 1
            }
          else
            echo "::warning::Brewfile.lock.json not committed yet — run 'brew bundle' once and commit it for reproducible installs"
          fi

      # Real-Darwin smoke of the entry points: the symlink plan (catches a dead link
      # SOURCE, e.g. a renamed core file) and the defaults dry-run, both no-ops.
      - name: bootstrap + defaults dry-run (no mutations)
        run: |
          ./bootstrap.sh --links-only --dry-run
          bash macos/defaults.sh --dry-run >/dev/null

      - name: repo behavioral tests (on real macOS)
        run: make test-repo

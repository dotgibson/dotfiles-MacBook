name: auto-tag (reusable)

# Cut an OS repo's OWN next release tag after a Core fan-out lands new core/ on its main.
# An OS repo carries two version lines — the Core it vendors (core.lock) and its own
# vX.Y.Z tag. core.lock advances automatically on every sync; this closes the gap for the
# second line so it stops drifting. PATCH-bumps by default (a new Core is a maintenance
# bump of the consumer); a caller can pass bump: minor/major for a deliberate release.
# Idempotent: a no-op when HEAD already carries a vX.Y.Z tag (see scripts/auto-tag.sh).
#
# Each OS repo adds a tiny caller, triggered only when a fan-out actually touched core/:
#
#   # .github/workflows/auto-tag.yml in an OS repo
#   name: auto-tag
#   on:
#     push:
#       branches: [main]
#       paths: ['core/**']
#   permissions: { contents: write }      # the tag push needs write
#   concurrency: { group: auto-tag-${{ github.ref }}, cancel-in-progress: false }
#   jobs:
#     tag:
#       uses: dotgibson/dotfiles-core/.github/workflows/auto-tag-call.yml@v3
#
# Runs the SAME scripts/auto-tag.sh the audit shellchecks/tests, so there is one
# definition of the version math. First-party only; tags in CI (no operator round-trip).

on:
  workflow_call:
    inputs:
      bump:
        description: "Which SemVer component to advance (patch|minor|major)."
        type: string
        required: false
        default: patch
      release:
        description: "Also create a GitHub Release for the cut tag (auto-generated notes)."
        type: boolean
        required: false
        default: true

permissions:
  contents: write

concurrency:
  group: auto-tag-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # The calling OS repo. fetch-depth 0 brings full history AND all tags (so the
      # latest vX.Y.Z resolves and the new tag is reachable); persisted credentials
      # (checkout default) let the script push the tag.
      - name: Check out the calling repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: true  # auto-tag.sh pushes the cut tag to the calling repo
          path: osrepo
          fetch-depth: 0
      # dotfiles-core carries the scripts (auto-tag.sh + gen-release-notes.sh); depth 1 is
      # enough (auto-tag reads the OS repo's history via -C, not Core's). Pin the checkout to
      # the SAME major line callers pin this workflow to (@v3) so the script version can't
      # drift from the pinned workflow definition — deterministic between releases, advancing
      # only when v3 moves (the @vN policy; RELEASE-STRATEGY.md).
      - name: Check out dotfiles-core (reference, pinned to v3)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          repository: ${{ github.repository_owner }}/dotfiles-core
          ref: v3
          path: dotfiles-core
          fetch-depth: 1
      - name: Cut the next release tag (idempotent)
        env:
          GH_TOKEN: ${{ github.token }} # gh release create (when release=true) needs a token
        run: ./dotfiles-core/scripts/auto-tag.sh "$GITHUB_WORKSPACE/osrepo" --push --bump "${{ inputs.bump }}" ${{ inputs.release && '--release' || '' }} --color never

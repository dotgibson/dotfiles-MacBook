name: core-freshness

# Thin caller for the reusable consumer-side freshness watcher authored in dotfiles-core
# (.github/workflows/core-freshness-call.yml) — one definition for the whole fleet. It
# runs this repo's own test/check-core-freshness.sh (0/2/1 exit contract) and nudges when
# the vendored core/ has fallen behind upstream dotfiles-core.
on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC (an hour after Core's own freshness run)
  workflow_dispatch:

concurrency:
  group: core-freshness-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vendored-core:
    uses: dotgibson/dotfiles-core/.github/workflows/core-freshness-call.yml@v4

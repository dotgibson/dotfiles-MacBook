# ================================================================================================
# AeroSpace — i3-like tiling window manager for macOS (https://github.com/nikitabobko/AeroSpace)
# Chosen over yabai: pure config, no SIP disable, no scripting-addition daemon. Fits the
# "declarative, committed-as-code" model of this repo. Symlinked to ~/.config/aerospace/.
#
# SHARED KEYMAP: this file is kept keystroke-for-keystroke identical to the Windows host's GlazeWM
# config (dotfiles-Windows/desktop/glazewm/config.yaml). Every binding below has an exact twin
# there; the two window managers are a single muscle-memory across macOS and Windows. Only bindings
# both WMs can express identically are kept — WM-specific extras (accordion, service mode,
# screenshots, per-app workspace pinning, directional monitor-move) were dropped for strict parity.
# Change one side → change the other.
#
# Modifier convention: alt (⌥) is the WM modifier here. Ghostty sets macos-option-as-alt=true,
# so alt bindings never collide with terminal accent input. The Karabiner Tab-hyper "window"
# layer (karabiner/karabiner.json) is the ergonomic alternative to these alt chords and mirrors
# the focus/move/workspace verbs below.
# ================================================================================================

# Config schema v2 — unlocks persistent-workspaces, the modern on-window-detected `if`/`run`
# syntax, and forward-compatible deprecation handling. (Omitting this pins you to legacy v1.)
config-version = 2

# NOTE: `auto-reload-config` is intentionally omitted — it isn't recognized by all released
# AeroSpace versions (older binaries reject it as an "Unknown top-level key" and fail to parse
# the whole file). Reload manually instead: alt-shift-r (the GlazeWM-parity reload bind) or
# `aerospace reload-config`.

# Start AeroSpace at login.
start-at-login = true

# Stop accidental cmd-h / cmd-alt-h from swallowing windows into macOS "Hide": if a window does
# get hidden, AeroSpace un-hides it on the next focus so it never silently vanishes from a tile.
automatically-unhide-macos-hidden-apps = true

# ── Startup processes ─────────────────────────────────────────────────────────────────────────
# Both helpers self-detect an already-running instance, so this is safe across config reloads.
#   • sketchybar  — the menu bar (config: sketchybar/); started here so the bar is up even if
#                   launchd ordering races AeroSpace.
#   • borders     — JankyBorders (FelixKratz), draws a colored ring around the focused window so
#                   the active tile is unmistakable. Palette matches tokyonight-storm: blue accent
#                   when focused, comment-grey when not. Installed via the Brewfile. The GlazeWM
#                   twin is its native window_effects border (same #7aa2f7 / #565f89 palette).
after-startup-command = [
  'exec-and-forget sketchybar',
  'exec-and-forget borders active_color=0xff7aa2f7 inactive_color=0xff565f89 width=4.0',
]

# Notify sketchybar on workspace change so the spaces widget repaints (see sketchybar/plugins).
exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

# Lazily warp the mouse to the center of the newly-focused monitor (i3's default). Keeps the
# pointer where your eyes already are after a cross-display focus jump. (GlazeWM twin:
# cursor_jump on window_focus.)
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Keep workspaces 1–5 alive even when empty so the sketchybar spaces widget always renders the
# full row (the bar enumerates these on launch). GlazeWM ships the same five workspaces.
persistent-workspaces = ['1', '2', '3', '4', '5']

# ── Normalization ───────────────────────────────────────────────────────────────────────────
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ── Layout & gaps ───────────────────────────────────────────────────────────────────────────
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto' # widescreen → horizontal, tall → vertical

# ── Auto-placement: float chrome ───────────────────────────────────────────────────────────────
# Runs once per newly-detected window. Bundle IDs come from AeroSpace's goodies list / `aerospace
# list-apps`. Float the small utility/settings windows that tile badly. (GlazeWM twin: the
# window_rules `ignore` list — same "don't tile OS chrome" intent, per-OS app list.) Per-app
# workspace pinning was removed for GlazeWM parity (GlazeWM has no workspace-assignment rule).
# (Must precede the [gaps] table — bare keys after a table header would nest under it.)
on-window-detected = [
  # Utilities & dialogs → floating (they have no business in the tile tree)
  { if.app-id = 'com.apple.systempreferences', run = 'layout floating' },
  { if.app-id = 'com.apple.ActivityMonitor', run = 'layout floating' },
  { if.app-id = 'com.apple.calculator', run = 'layout floating' },
  { if.app-id = 'com.apple.finder', run = 'layout floating' },
  { if.app-id = 'com.1password.1password', run = 'layout floating' },
]

[gaps]
inner.horizontal = 4
inner.vertical = 4
outer.bottom = 4
# Top gap reserves the strip SketchyBar floats in. It must clear the bar's footprint
# (sketchybarrc: bar height=20 at y_offset=0, so ~20px) on EVERY display, because the macOS
# menu bar is set to auto-hide ("Always"), so the system reserves no top strip of its own —
# 21 leaves a ~1px breather below the bar. (The GlazeWM twin reserves its own top gap for Zebar;
# the pixel value differs because the bars differ.)
outer.top = 48
outer.right = 4
outer.left = 4

# ── Main mode keybindings ───────────────────────────────────────────────────────────────────
[mode.main.binding]
# Focus (vim hjkl)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move the focused window
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Quick nudge-resize (per-axis; the dedicated resize mode below is for sustained adjustment).
# Mirrors GlazeWM: u/p = width -/+, o/i = height +/-.
alt-u = 'resize width -50'
alt-p = 'resize width +50'
alt-o = 'resize height +50'
alt-i = 'resize height -50'

# Layout
alt-v = 'layout tiles horizontal vertical' # toggle split orientation (GlazeWM: toggle-tiling-direction)
alt-f = 'fullscreen'
alt-shift-space = 'layout floating tiling' # toggle floating for the focused window
alt-shift-q = 'close'                      # close the focused window

# Workspaces 1–5
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

# Move focused window to workspace (then follow it)
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']

# Workspace navigation (GlazeWM: a = prev, s = next, d = recent)
alt-a = 'workspace --wrap-around prev'
alt-s = 'workspace --wrap-around next'
alt-d = 'workspace-back-and-forth'

# Open a new Ghostty window (`open -n` forces a fresh instance rather than just
# refocusing an existing one). Single-line on purpose: AeroSpace's TOML parser
# (TOMLDecoder) does not accept multi-line '''…''' literal strings. (GlazeWM twin: `shell-exec wt`.)
alt-enter = 'exec-and-forget open -na Ghostty'

# Enter the dedicated resize mode (h/j/k/l to size, esc/enter to leave)
alt-r = 'mode resize'

# Reload the config (GlazeWM: wm-reload-config)
alt-shift-r = 'reload-config'

# ── Resize mode ─────────────────────────────────────────────────────────────────────────────
# Identical to GlazeWM's resize binding-mode: h/l size width, k/j size height, esc/enter exit.
[mode.resize.binding]
h = 'resize width -50'
l = 'resize width +50'
k = 'resize height +50'
j = 'resize height -50'
enter = 'mode main'
esc = 'mode main'

# Local commit-time lint gate. One-time setup:  pre-commit install
# Mirrors the CI checks (see .github/workflows/ci.yml) so failures surface before push.
#
# core/ is a vendored git-subtree from dotfiles-core — excluded globally so hooks
# never rewrite vendored files (that would diverge the subtree). It is linted in
# dotfiles-core's own CI. See README "Development".
exclude: "^core/"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-yaml

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-2
    hooks:
      - id: shfmt
        args: [-i, "2", -d]

  # ── Mirror the remaining CI gates so "passes pre-commit" == "passes CI" ──────
  # CI also runs actionlint and `zsh -n`; without these two the local gate was a
  # subset and a workflow/zsh break could pass pre-commit yet fail CI. These use
  # the system binaries the Brewfile already installs (actionlint, zsh) — there's
  # no pinned, toolchain-free pre-commit-managed binary for either.
  - repo: local
    hooks:
      - id: actionlint
        name: actionlint (GitHub Actions workflows)
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
      - id: zsh-syntax
        name: zsh -n (repo-owned zsh modules)
        entry: make zsh-syntax
        language: system
        pass_filenames: false
        files: (\.zsh$|^zsh/)

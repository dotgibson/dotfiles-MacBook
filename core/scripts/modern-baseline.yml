# scripts/modern-baseline.yml
# ──────────────────────────────────────────────────────────────────────────────
# THE MODERN FLOOR for the fleet's CI. This is the declarative source of truth for
# what "modern" means; scripts/check-modern.sh enforces every rule here, and
# audit-core.sh runs it as a gate (section 8c) so a workflow can never regress below
# the floor. It generalizes the SHA-pinning discipline the fleet already follows into
# ONE contract — and closes G8 (mutable container tags were the one break in it).
#
# Raise the floor DELIBERATELY (the future /modernize routine proposes bumps); never
# lower it. The format is intentionally FLAT and greppable — top-level `key:` scalars
# and `key:` + `  - item` lists only — so check-modern.sh parses it with awk, not a
# YAML library (the same "no dependency" discipline as tool-versions.env).
# ──────────────────────────────────────────────────────────────────────────────
schema: 1

# 1) Deprecated GitHub Actions workflow-command patterns that must never appear.
#    The stdout `set-output`/`save-state`/`set-env`/`add-path` commands were removed;
#    use the $GITHUB_OUTPUT / $GITHUB_ENV / $GITHUB_PATH files instead.
banned_patterns:
  - "::set-output"
  - "::save-state"
  - "::set-env"
  - "::add-path"
  # Old JS action runtimes: Node 24 is the default runner runtime since 2026-06-16;
  # node20 removal lands fall 2026, node16 is long gone. Guards first-party action.yml
  # `using:` declarations from browning out (third-party runtimes live in SHA-pinned
  # upstreams and are a freshness-triage concern, not a floor one).
  - "using: node16"
  - "using: node20"
  # The per-step opt-out that forces a node20 action to keep running on node20. It
  # stops working entirely once node20 leaves the runners (fall 2026), so reaching
  # for it buys a few months and then browns out — ban the dead end rather than let
  # a future bump-dodge land on it.
  - "ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION"

# 2) End-of-life runner labels that must not be used — pick a supported image.
banned_runners:
  - ubuntu-18.04
  - ubuntu-20.04
  - macos-11
  - macos-12
  # Full-line comments only — check-modern.sh's list parser does NOT strip an inline
  # `# …`, so a trailing comment would become part of the banned string and the ban
  # would silently never match. Rationale for the four below: macos-13 retired
  # 2025-12-04; windows-2019 unsupported since 2025-06-30; ubuntu-22.04 deprecation
  # opens 2026-09-17 (pre-emptive — the fleet rides ubuntu-latest, so it's free to ban);
  # macos-14 deprecation opened 2026-07-06, fully unsupported 2026-11-02 (pre-emptive —
  # the fleet rides macos-latest, so it's free to ban).
  - macos-13
  - windows-2019
  - ubuntu-22.04
  - macos-14

# 3) Every EXTERNAL action `uses:` must pin a full 40-hex commit SHA (a tag or branch
#    is mutable and a supply-chain risk). Local `./…` refs and the fleet's own reusable
#    workflows — which follow the @vN moving-major policy in RELEASE-STRATEGY.md — are
#    exempt (owner below).
require_action_sha_pin: true
sha_pin_exempt_owner: dotgibson

# 4) Every container image (`image:` value or a `docker run|build … <image>`) must pin
#    an @sha256: digest — a tag like `alpine:3.21` or `archlinux:latest` moves under you.
require_container_digest_pin: true

# 5) Every WORKFLOW must declare a top-level `permissions:` block. Without one a job
#    inherits the repo-wide default token scope; naming it forces the least-privilege
#    grant to be a deliberate, reviewable line. Workflows only — `permissions:` is not
#    a valid key in a composite action.yml, so check-modern.sh scopes this rule to
#    .github/workflows/ and skips .github/actions/.
require_workflow_permissions: true

# 6) Every `actions/checkout` step must state `persist-credentials:` explicitly. Left
#    unset it defaults to TRUE, writing the job's token into .git/config where any later
#    step — a third-party linter, a scripted tool, an LLM routine reading the tree — can
#    read it back out. Nearly every checkout here only reads code and wants `false`.
#
#    Requiring the KEY rather than hard-requiring the VALUE `false` is deliberate: it is
#    the exemption path. The few steps that genuinely push (auto-tag's tag push, the
#    freshness bot's branch push) carry `persist-credentials: true` plus a comment saying
#    why, right at the call site — so the exemption is reviewed in the diff that needs it
#    instead of living in a list here that silently drifts out of sync with the workflows.
require_explicit_persist_credentials: true

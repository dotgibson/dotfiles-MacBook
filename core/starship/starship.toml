"$schema" = 'https://starship.rs/config-schema.json'

# dotfiles-* :: starship prompt  (tokyonight-storm, low-glare revision)
# ──────────────────────────────────────────────────────────────────────────────
# WHAT CHANGED & WHY:
# The previous revision kept the gruvbox-era layout but swapped in tokyonight hex
# values — and tokyonight's orange/yellow/cyan are *foreground accents*, not fill
# colors. Using them as big segment BACKGROUNDS with light text gave you three
# glaring bright bands. This revision inverts that relationship:
#
#   • Every segment now sits on one of two DARK surface shades (srf1/srf2) that
#     step subtly so the powerline arrows still read as a gentle ridge, not a
#     rainbow. The shapes/format are unchanged — only the color model flipped.
#   • The bright tokyonight colors are now the TEXT/ICON color of each segment,
#     so each band is still identifiable at a glance but easy on the eyes:
#         os/user → blue · dir → yellow · git branch → green · git status → orange
#         languages → cyan · docker/conda → purple · time → muted
#
# KNOB: want a touch more pop on one band? Change just that module's text color
# (the `fg:` inside its `format`). To go even calmer, point a module at
# color_comment. Nothing else needs to move.
# ──────────────────────────────────────────────────────────────────────────────

format = """
[](fg:color_srf1)\
$os\
$username\
[](fg:color_srf1 bg:color_srf2)\
$directory\
[](fg:color_srf2 bg:color_srf1)\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
[](fg:color_srf1 bg:color_srf2)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$ruby\
$lua\
[](fg:color_srf2 bg:color_srf1)\
$docker_context\
$kubernetes\
$conda\
$pixi\
$direnv\
[](fg:color_srf1 bg:color_srf2)\
$cmd_duration\
$jobs\
$time\
[ ](fg:color_srf2)\
$line_break$status$character"""

palette = 'tokyonight_storm'

[palettes.tokyonight_storm]
# ── accents — now used as TEXT, not as fills ──────────────────────────────────
color_fg0     = '#c0caf5'   # fg (brightest text)
color_fg_dark = '#a9b1d6'   # softer text (quiet segments)
color_blue    = '#7aa2f7'
color_aqua    = '#7dcfff'   # cyan
color_green   = '#9ece6a'
color_orange  = '#ff9e64'
color_purple  = '#bb9af7'   # magenta
color_red     = '#f7768e'
color_yellow  = '#e0af68'
color_comment = '#565f89'   # muted / de-emphasized
# ── surfaces — the two dark segment fills (subtle stepped depth) ──────────────
color_srf1    = '#24283b'   # storm bg, slightly raised above the terminal
color_srf2    = '#1f2335'   # bg_dark, a touch deeper

[os]
disabled = false
style = "bg:color_srf1 fg:color_blue"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "bg:color_srf1 fg:color_fg0"
style_root = "bg:color_srf1 fg:color_red"   # root stands out (kept readable, not a fill)
format = '[ $user ]($style)'

[directory]
style = "fg:color_yellow bg:color_srf2"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:color_srf1"
format = '[[ $symbol $branch ](fg:color_green bg:color_srf1)]($style)'

[git_status]
style = "bg:color_srf1"
format = '[[($all_status$ahead_behind )](fg:color_orange bg:color_srf1)]($style)'

# Added/deleted line counts (+12 -3) on the same srf1 git band, after status. Green/red
# text matching git's own diff colors. only_nonzero_diffs keeps it silent in a clean tree,
# so the segment only appears once you've actually changed something.
[git_metrics]
disabled = false
only_nonzero_diffs = true
added_style = "fg:color_green bg:color_srf1"
deleted_style = "fg:color_red bg:color_srf1"
format = '([+$added ]($added_style))([-$deleted ]($deleted_style))'

# Short commit hash, shown ONLY in detached-HEAD state (only_detached = true) so
# a `git checkout <sha>`/`<tag>` no longer leaves the git band misleadingly blank.
# Green text to read as a sibling of the branch, on the same srf1 surface.
[git_commit]
only_detached = true
tag_disabled = false      # also surface an exact tag (e.g. v1.2.0) when on one
tag_symbol = " 󰓹 "
style = "bg:color_srf1"
format = '[[ $hash$tag ](fg:color_green bg:color_srf1)]($style)'

# Mid-operation state (REBASING 2/8, MERGING, CHERRY-PICKING…). Red text so an
# in-progress rebase/merge is impossible to miss; sits in the same srf1 git band
# between branch and status, and only appears when an operation is underway.

[git_state]
style = "bg:color_srf1"
format = '[[ $state( $progress_current/$progress_total) ](fg:color_red bg:color_srf1)]($style)'

[nodejs]
symbol = ""
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[bun]
symbol = ""
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[c]
symbol = " "
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[cpp]
symbol = " "
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[rust]
symbol = ""
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[golang]
symbol = ""
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[php]
symbol = ""
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[java]
symbol = ""
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[kotlin]
symbol = ""
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[haskell]
symbol = ""
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[python]
symbol = ""
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[docker_context]
symbol = ""
style = "bg:color_srf1"
format = '[[ $symbol( $context) ](fg:color_purple bg:color_srf1)]($style)'

# Kubernetes context (+ namespace) on the srf1 ops band, cyan text. GATED on real k8s
# project markers (Helm charts, kustomize, skaffold, a k8s/ dir, or an explicit
# KUBECONFIG export) — without detect_* config starship would render this in EVERY
# directory that has a current context, which is noise. context_aliases can shorten
# long ARNs/GKE names; add your clusters there as needed.
[kubernetes]
disabled = false
symbol = "󱃾 "
style = "bg:color_srf1"
format = '[[ $symbol$context( \($namespace\)) ](fg:color_aqua bg:color_srf1)]($style)'
detect_files = ['Chart.yaml', 'skaffold.yaml', 'kustomization.yaml']
detect_folders = ['k8s', '.helm', 'manifests']
detect_env_vars = ['KUBECONFIG']
# [kubernetes.context_aliases]
# "arn:aws:eks:us-east-1:123456789:cluster/prod" = "prod"

[conda]
style = "bg:color_srf1"
format = '[[ $symbol( $environment) ](fg:color_purple bg:color_srf1)]($style)'

[pixi]
style = "bg:color_srf1"
format = '[[ $symbol( $version)( $environment) ](fg:color_purple bg:color_srf1)]($style)'

# direnv state on the srf1 band — you hook direnv in os/macos.zsh but had no visual
# feedback that an .envrc was loaded vs. waiting for `direnv allow`. Yellow when allowed
# & loaded, red when blocked/denied so an un-allowed .envrc is obvious. Only renders in a
# directory under direnv's control (an .envrc up the tree).
[direnv]
disabled = false
symbol = " "
style = "bg:color_srf1"
format = '[[ $symbol$loaded ](fg:color_yellow bg:color_srf1)]($style)'
loaded_msg = "on"
unloaded_msg = "off"
allowed_msg = ""
not_allowed_msg = " "
denied_msg = " "

# ruby + lua are declared in mise/config.toml as global runtimes, so they belong
# in the language band alongside the rest. Same cyan-on-srf2 treatment. (Section
# order here is irrelevant — the `format` string at the top controls layout.)
[ruby]
symbol = ""
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

[lua]
symbol = ""
style = "bg:color_srf2"
format = '[[ $symbol( $version) ](fg:color_aqua bg:color_srf2)]($style)'

# How long the last command took (only when it exceeds min_time). Orange text on
# the same srf2 surface as time, so slow commands gently announce themselves
# without a color clash. Transient: it vanishes after a quick command.
[cmd_duration]
min_time = 2000
style = "bg:color_srf2"
format = '[[ 󰔛 $duration ](fg:color_orange bg:color_srf2)]($style)'

# Background job count (`&`, Ctrl-Z). Purple text, srf2 surface; only shows when
# at least one job is running.
[jobs]
symbol = '+'
symbol_threshold = 1
number_threshold = 1
style = "bg:color_srf2"
format = '[[ $symbol $number ](fg:color_purple bg:color_srf2)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_srf2"
format = '[[  $time ](fg:color_fg_dark bg:color_srf2)]($style)'

[line_break]
disabled = false

# Exit code of the last command, on the prompt line (no powerline surface — the
# ridge has already ended). success_symbol is empty, so this renders NOTHING on
# success and only speaks up on failure, complementing the red character arrow
# with the actual code/reason: 127 → not found, 126 → not executable, SIGINT on
# Ctrl-C, SIGKILL on an OOM, etc. pipestatus breaks down which stage of a
# `a | b | c` pipeline failed.
[status]
disabled = false
style = "fg:color_red"
symbol = "✘ "
not_executable_symbol = "🚫 "
not_found_symbol = "🔍 "
sigint_symbol = "🧱 "
signal_symbol = "⚡ "
recognize_signal_code = true
map_symbol = true
pipestatus = true
pipestatus_separator = '[|](fg:color_comment)'
format = '[$symbol$common_meaning$signal_name$maybe_int]($style) '
pipestatus_format = '[$pipestatus]($style) => [$symbol$common_meaning$signal_name$maybe_int]($style) '

[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'

name: freshness

# Supply-chain freshness gate for Core's RUNTIME pins. The zsh-plugin SHAs
# (zsh/plugins.zsh) and the Neovim lockfile (nvim/lazy-lock.json) are pinned so
# nothing floats silently into the 9 OS repos — but a pin, once set, also rots: a
# pinned-and-forgotten plugin can sit on a known-vuln commit indefinitely across
# every machine. dependabot only watches the github-actions ecosystem (see
# .github/dependabot.yml), so these were unmonitored. This job is their watcher:
# weekly (and on demand) it runs the scripts' --check mode, which exits non-zero when
# a pin is behind upstream — surfacing drift proactively instead of during an incident.
# A red run is the NUDGE to run `make update-plugins` / `make update-nvim-plugins`.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: # let the maintainer trigger a check on demand

permissions:
  contents: read

concurrency:
  group: freshness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zsh-plugins:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Lightweight: --check just git-ls-remotes each pinned upstream's HEAD.
      - name: Check zsh plugin pins against upstream
        run: |
          if ./scripts/update-plugins.sh --check; then
            echo "✅ all zsh plugin pins current" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### ⚠️ zsh plugin pins are behind upstream"
              echo ""
              echo "Run \`make update-plugins\` to roll them forward, review, and commit."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  nvim-plugins:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Load pinned tool versions
        run: grep -E '^[A-Z0-9_]+=' scripts/tool-versions.env >> "$GITHUB_ENV"
      # Heavier: re-clones the plugin set headlessly via the repo's real nvim config.
      - name: Install neovim (pinned)
        run: |
          set -euxo pipefail
          ver="${NVIM_VERSION}"
          url="https://github.com/neovim/neovim/releases/download/v${ver}/nvim-linux-x86_64.tar.gz"
          curl -fsSL "$url" | sudo tar -xz -C /opt
          sudo ln -sf /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim
      - name: Check nvim lockfile against upstream
        run: |
          if ./scripts/update-nvim-plugins.sh --check; then
            echo "✅ nvim plugin lock current" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### ⚠️ nvim plugin lock (nvim/lazy-lock.json) is behind upstream"
              echo ""
              echo "Run \`make update-nvim-plugins\` to refresh the lock, review, and commit."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

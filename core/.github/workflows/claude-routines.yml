name: claude-routines

# Scheduled "judgment-work" bots: run the on-demand Claude Code maintenance routines
# (.claude/commands) HEADLESS on a weekly cron and file their findings as a deduplicated
# GitHub issue — so the doc-drift sweep and the modern-CLI scout happen on their own
# instead of waiting for a human to run them. Complements freshness.yml, which already
# automates the MECHANICAL pin bumps; this covers the chores that need judgment.
#
# First-party only (same principle as freshness.yml): the Claude Code CLI is installed
# from npm at a pinned version (CLAUDE_CODE_VERSION in scripts/tool-versions.env) — NO
# third-party marketplace action to trust. Auth is the CLAUDE_CODE_OAUTH_TOKEN repo secret
# (a Claude subscription token minted locally with `claude setup-token`).
#
# INERT BY DEFAULT: with no CLAUDE_CODE_OAUTH_TOKEN secret the jobs no-op with a warning (so a
# fork — or this repo before you opt in — never gets a red X). Add the secret to enable.
# Scheduled runs draw on the subscription's usage; the weekly cadence keeps that predictable.

on:
  schedule:
    # Each cron routes to exactly ONE routine via the per-job `github.event.schedule`
    # gate below — so adding a routine is a new cron + a new job, never a double-fire of
    # the others. Staggered an hour apart so no two Opus runs overlap (predictable usage).
    - cron: "0 7 * * 2" # Tue 07:00 UTC — tool-scout + doc-audit (the original pair)
    - cron: "0 8 * * 2" # Tue 08:00 UTC — freshness-triage (after Mon's freshness.yml opened its PRs)
    - cron: "0 9 * * 2" # Tue 09:00 UTC — modernize (scouts the next CI floor)
    - cron: "0 10 * * 2" # Tue 10:00 UTC — release-readiness (weekly go/no-go; last in the stagger)
  workflow_dispatch:
    inputs:
      routine:
        description: "which routine to run"
        type: choice
        default: both
        # release-notes is dispatch-only (you draft notes AT release time, not weekly).
        options: [both, doc-audit, tool-scout, freshness-triage, modernize, release-readiness, release-notes]

permissions:
  contents: read

concurrency:
  group: claude-routines-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate: is the auth token configured? Secrets can't be read in job-level `if`, so a tiny
  # job exposes presence as an output the real jobs depend on. Absent → warn and skip.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      has_key: ${{ steps.k.outputs.has_key }}
    steps:
      - id: k
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "has_key=true" >>"$GITHUB_OUTPUT"
          else
            echo "has_key=false" >>"$GITHUB_OUTPUT"
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN secret not set — Claude routines are scaffolded but inactive. Add the secret to enable them."
          fi

  tool-scout:
    needs: preflight
    if: >-
      needs.preflight.outputs.has_key == 'true' &&
      (github.event.schedule == '0 7 * * 2' ||
       github.event.inputs.routine == 'both' ||
       github.event.inputs.routine == 'tool-scout')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      ISSUE_TITLE: "tool-scout: weekly modern-CLI scan"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Load pinned tool versions
        run: grep -E '^[A-Z0-9_]+=' scripts/tool-versions.env >>"$GITHUB_ENV"
      - name: Install Claude Code CLI (pinned)
        # Fail fast if the pin didn't load — never silently fall back to a floating `latest`.
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION:?not loaded from scripts/tool-versions.env}"
      - name: Run /tool-scout
        run: |
          claude -p "/tool-scout" \
            --model opus \
            --permission-mode default \
            --allowedTools "Task,Read,Grep,Glob,Bash,WebSearch,WebFetch" \
            --output-format text | tee "$RUNNER_TEMP/tool-scout.md"
      - name: File the report as an issue
        run: bash .github/workflows/file-routine-issue.sh "$ISSUE_TITLE" "$RUNNER_TEMP/tool-scout.md"

  doc-audit:
    needs: preflight
    if: >-
      needs.preflight.outputs.has_key == 'true' &&
      (github.event.schedule == '0 7 * * 2' ||
       github.event.inputs.routine == 'both' ||
       github.event.inputs.routine == 'doc-audit')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      issues: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      OWNER: ${{ github.repository_owner }}
      ISSUE_TITLE: "doc-audit: weekly fleet consistency sweep"
    steps:
      # Check dotfiles-core into a subdir so the rest of the fleet can sit beside it as
      # siblings — the layout the doc-consistency subagent (and sync-core.sh) expect.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: dotfiles-core
      - name: Clone the rest of the fleet (read-only, shallow)
        run: |
          for r in dotfiles-MacBook dotfiles-Alpine dotfiles-Arch dotfiles-Defense \
                   dotfiles-Fedora dotfiles-Gentoo dotfiles-Kali dotfiles-openSUSE \
                   dotfiles-Windows dotfiles-web; do
            git clone --depth 1 "https://github.com/${OWNER}/${r}.git" "$r" 2>/dev/null \
              || echo "::warning::could not clone $r (skipping it in the sweep)"
          done
      - name: Load pinned tool versions
        working-directory: dotfiles-core
        run: grep -E '^[A-Z0-9_]+=' scripts/tool-versions.env >>"$GITHUB_ENV"
      - name: Install Claude Code CLI (pinned)
        # Fail fast if the pin didn't load — never silently fall back to a floating `latest`.
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION:?not loaded from scripts/tool-versions.env}"
      - name: Run /doc-audit across the fleet
        working-directory: dotfiles-core
        run: |
          claude -p "/doc-audit" \
            --add-dir "$GITHUB_WORKSPACE" \
            --model opus \
            --permission-mode default \
            --allowedTools "Task,Read,Grep,Glob,Bash" \
            --output-format text | tee "$RUNNER_TEMP/doc-audit.md"
      - name: File the report as an issue
        working-directory: dotfiles-core
        run: bash .github/workflows/file-routine-issue.sh "$ISSUE_TITLE" "$RUNNER_TEMP/doc-audit.md"

  # The judgment half of the freshness bot (command already exists; this schedules it).
  # Runs an hour after tool-scout/doc-audit so no two Opus routines overlap. Reads the open
  # bump PRs (freshness.yml + dependabot) and the `--check` scripts, then files a Merge/Hold
  # verdict per PR — report-first, edits nothing.
  freshness-triage:
    needs: preflight
    if: >-
      needs.preflight.outputs.has_key == 'true' &&
      (github.event.schedule == '0 8 * * 2' ||
       github.event.inputs.routine == 'freshness-triage')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      pull-requests: read # read the open bump PRs it triages
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      ISSUE_TITLE: "freshness-triage: weekly bump-PR review"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Load pinned tool versions
        run: grep -E '^[A-Z0-9_]+=' scripts/tool-versions.env >>"$GITHUB_ENV"
      - name: Install Claude Code CLI (pinned)
        # Fail fast if the pin didn't load — never silently fall back to a floating `latest`.
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION:?not loaded from scripts/tool-versions.env}"
      - name: Run /freshness-triage
        run: |
          claude -p "/freshness-triage" \
            --model opus \
            --permission-mode default \
            --allowedTools "Task,Read,Grep,Glob,Bash,WebSearch,WebFetch" \
            --output-format text | tee "$RUNNER_TEMP/freshness-triage.md"
      - name: File the report as an issue
        run: bash .github/workflows/file-routine-issue.sh "$ISSUE_TITLE" "$RUNNER_TEMP/freshness-triage.md"

  # The judgment half of the modernization floor (command already exists; this schedules it).
  # Runs an hour after freshness-triage so no two Opus routines overlap. Reads the declared
  # floor (scripts/modern-baseline.yml) + the fleet's workflows, researches the latest
  # runner/action deprecations, then files a report-first proposal for the NEXT floor —
  # edits nothing. Complements check-modern.sh, which enforces the CURRENT floor.
  modernize:
    needs: preflight
    if: >-
      needs.preflight.outputs.has_key == 'true' &&
      (github.event.schedule == '0 9 * * 2' ||
       github.event.inputs.routine == 'modernize')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      ISSUE_TITLE: "modernize: weekly CI-floor scan"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Load pinned tool versions
        run: grep -E '^[A-Z0-9_]+=' scripts/tool-versions.env >>"$GITHUB_ENV"
      - name: Install Claude Code CLI (pinned)
        # Fail fast if the pin didn't load — never silently fall back to a floating `latest`.
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION:?not loaded from scripts/tool-versions.env}"
      - name: Run /modernize
        run: |
          claude -p "/modernize" \
            --model opus \
            --permission-mode default \
            --allowedTools "Task,Read,Grep,Glob,Bash,WebSearch,WebFetch" \
            --output-format text | tee "$RUNNER_TEMP/modernize.md"
      - name: File the report as an issue
        run: bash .github/workflows/file-routine-issue.sh "$ISSUE_TITLE" "$RUNNER_TEMP/modernize.md"

  # The go/no-go gate in front of RELEASE-RUNBOOK.md (command already exists; this schedules
  # it). Runs an hour after modernize so no two Opus routines overlap. Reads CHANGELOG's
  # [Unreleased] + the commits since the last release, the audit status, version coherence,
  # and fleet drift, then files a READY-to-cut-vX.Y.Z / HOLD verdict — report-first, edits
  # nothing. fetch-depth 0: it reads `git log <last-release>..HEAD`, which a shallow clone lacks.
  release-readiness:
    needs: preflight
    if: >-
      needs.preflight.outputs.has_key == 'true' &&
      (github.event.schedule == '0 10 * * 2' ||
       github.event.inputs.routine == 'release-readiness')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      ISSUE_TITLE: "release-readiness: weekly go/no-go"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Load pinned tool versions
        run: grep -E '^[A-Z0-9_]+=' scripts/tool-versions.env >>"$GITHUB_ENV"
      - name: Install Claude Code CLI (pinned)
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION:?not loaded from scripts/tool-versions.env}"
      - name: Run /release-readiness
        run: |
          claude -p "/release-readiness" \
            --model opus \
            --permission-mode default \
            --allowedTools "Task,Read,Grep,Glob,Bash,WebSearch,WebFetch" \
            --output-format text | tee "$RUNNER_TEMP/release-readiness.md"
      - name: File the report as an issue
        run: bash .github/workflows/file-routine-issue.sh "$ISSUE_TITLE" "$RUNNER_TEMP/release-readiness.md"

  # Draft the next release's notes from Conventional Commits. DISPATCH-ONLY (no cron) — you
  # draft notes at release time, not on a weekly beat. Selectable via the workflow_dispatch
  # `routine` input. fetch-depth 0 for the `git log <range>` the draft needs.
  release-notes:
    needs: preflight
    if: >-
      needs.preflight.outputs.has_key == 'true' &&
      github.event.inputs.routine == 'release-notes'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      ISSUE_TITLE: "release-notes: draft for the next release"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Load pinned tool versions
        run: grep -E '^[A-Z0-9_]+=' scripts/tool-versions.env >>"$GITHUB_ENV"
      - name: Install Claude Code CLI (pinned)
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION:?not loaded from scripts/tool-versions.env}"
      - name: Run /release-notes
        run: |
          claude -p "/release-notes" \
            --model opus \
            --permission-mode default \
            --allowedTools "Task,Read,Grep,Glob,Bash" \
            --output-format text | tee "$RUNNER_TEMP/release-notes.md"
      - name: File the report as an issue
        run: bash .github/workflows/file-routine-issue.sh "$ISSUE_TITLE" "$RUNNER_TEMP/release-notes.md"

  # Turn a failed routine run into a deduplicated issue (G1). Skipped jobs (no token, or a
  # cron that didn't select them) are NOT failures, so this fires only on a real crash.
  notify-failure:
    needs: [tool-scout, doc-audit, freshness-triage, modernize, release-readiness, release-notes]
    if: failure()
    permissions:
      contents: read
      issues: write
    uses: ./.github/workflows/notify-failure-call.yml
    with:
      workflow: claude-routines
      title: "ci-failure: claude-routines is red"
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      details: "A scheduled Claude maintenance routine (tool-scout / doc-audit / freshness-triage) failed to complete — its weekly report was not filed."

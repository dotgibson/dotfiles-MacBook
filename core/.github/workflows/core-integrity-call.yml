name: core-integrity (reusable)

# Per-repo PR-time core-guard, callable by every OS repo. The central core-integrity.yml
# in this repo SWEEPS the whole fleet weekly (detection); THIS reusable workflow lets an
# OS repo BLOCK a hand-edit to its vendored core/ at its own PR boundary (prevention) —
# the durable replacement for the un-versioned .git/hooks core-guard. Each OS repo adds a
# tiny caller:
#
#   # .github/workflows/core-integrity.yml in an OS repo
#   name: core-integrity
#   on: [pull_request, push]
#   permissions: { contents: read }
#   jobs:
#     guard:
#       uses: dotgibson/dotfiles-core/.github/workflows/core-integrity-call.yml@main
#
# It checks out the calling repo + this repo (the reference, full history), then runs
# scripts/core-integrity.sh --self against the caller — the SAME content-addressed
# tree-SHA comparison the fleet sweep uses, so there is one definition of "pristine".
# First-party only (no third-party action); read-only.

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # The calling OS repo. depth 1 is enough: the check only needs its current
      # HEAD:core tree object + root core.lock.
      - name: Check out the calling repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: osrepo
          fetch-depth: 1
      # dotfiles-core is the reference: full history (fetch-depth 0) so the caller's
      # locked core_sha resolves to a tree object here, and it carries the script.
      #
      # DELIBERATELY UNPINNED (default branch), unlike auto-tag-call.yml which pins
      # dotfiles-core to @v2. Here the checkout is also the OBJECT DATABASE the check
      # resolves core.lock's core_sha against — and a repo synced from `main` between
      # releases pins a core_sha NEWER than the latest vN tag. Pinning to @v2 would make
      # that object absent and the integrity check FALSE-FAIL. The reference must track
      # main (the most complete history); the script it carries is a stable comparison,
      # so reproducibility is a non-issue. Do not "fix" this by adding `ref: v2`.
      - name: Check out dotfiles-core (reference)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.repository_owner }}/dotfiles-core
          path: dotfiles-core
          fetch-depth: 0
      - name: Verify vendored core/ is pristine vs core.lock
        run: ./dotfiles-core/scripts/core-integrity.sh --self "$GITHUB_WORKSPACE/osrepo" --color never

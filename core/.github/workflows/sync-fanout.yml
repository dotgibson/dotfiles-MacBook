# .github/workflows/sync-fanout.yml
# ──────────────────────────────────────────────────────────────────────────────
# AUTOMATED CORE FAN-OUT — the maintain button, on a trigger.
#
# Core is authored once here and vendored into every OS repo's core/ via git
# subtree (scripts/sync-core.sh). That fan-out was a MANUAL `make sync` a human had
# to remember — and when they forgot, the whole fleet silently sat a major version
# behind (the exact drift fleet-drift.yml is built to catch). This workflow closes
# that last mile: when a vX.Y.Z release is published, it runs the same audit-gated
# sync-core.sh from CI and opens a `core.lock`-bump PR against every repo in
# scripts/os-repos.txt.
#
# IT OPENS PRs, IT NEVER MERGES. The three opt-in gates in RELEASE-STRATEGY.md stay
# intact — Core still never pushes to a live host. A human reviews and merges each
# PR, canary-first (dotfiles-MacBook), per the staged rollout. The bot only removes
# the typing, not the judgement.
#
# PINNED TO THE RELEASED COMMIT, NOT main: each PR vendors the exact commit the tag
# points at (CORE_BRANCH=<sha>), so core.lock records that commit and `git describe`
# stamps the named tag — "what Alpine runs" is a frozen version, per RELEASE-STRATEGY.
#
# AUTH: the built-in GITHUB_TOKEN is scoped to dotfiles-core only — it cannot push a
# branch or open a PR in another repo. This needs a FLEET_SYNC_TOKEN secret: a
# fine-grained PAT or GitHub App installation token with `contents:write` +
# `pull-requests:write` on the dotfiles-* OS repos. The preflight step fails loudly
# with setup instructions if it is absent.
#
# NB: workflow_run + workflow_dispatch triggers only take effect once this file is on
# the default branch (GitHub reads both from main, never from a feature branch). After
# merge, dry-run it by hand via "Run workflow" with a past tag before the next release.
# ──────────────────────────────────────────────────────────────────────────────
name: sync-fanout

on:
  # Fires after release.yml publishes a tag. workflow_run is used (not `release:
  # published`) because a Release created by GITHUB_TOKEN does NOT emit a `release`
  # event — that recursion guard would make this never run. workflow_run has no such
  # block, and its head_branch is the tag name release.yml ran on.
  workflow_run:
    workflows: ["release"]
    types: [completed]
  # Manual re-run / backfill: fan out an arbitrary released tag, optionally to a
  # subset of repos (space-separated, e.g. "dotfiles-MacBook dotfiles-Arch").
  workflow_dispatch:
    inputs:
      tag:
        description: "Released Core tag to fan out (vX.Y.Z)"
        required: true
      repos:
        description: "Optional subset of OS repos (space-separated); blank = whole fleet"
        required: false
        default: ""

# Only the default token is requested (read access to check out Core). All cross-repo
# writes go through FLEET_SYNC_TOKEN, never the workflow token.
permissions:
  contents: read

# Never run two fan-outs at once (a second release mid-fan-out would race the clones
# and PRs); do NOT cancel an in-flight run — let a fan-out finish.
concurrency:
  group: sync-fanout
  cancel-in-progress: false

jobs:
  fanout:
    # First-party only, and on the workflow_run path only when the release actually
    # succeeded (a failed/cancelled release must not fan a half-baked tag out).
    if: >-
      github.repository_owner == 'Gerrrt' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ── Resolve the tag to fan out, and bail cleanly on anything that isn't a clean
      # SemVer release tag (a prerelease, a branch build, a mis-trigger). ──
      - name: Resolve release tag
        id: resolve
        env:
          EVENT: ${{ github.event_name }}
          WR_BRANCH: ${{ github.event.workflow_run.head_branch }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = workflow_dispatch ]; then tag="${INPUT_TAG:-}"; else tag="${WR_BRANCH:-}"; fi
          ver="${tag#v}"
          if ! printf '%s' "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::notice::'$tag' is not a clean vX.Y.Z release tag — nothing to fan out"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo ":: will fan out Core $tag"

      # ── Fail early and legibly if the cross-repo token is missing — otherwise the
      # first clone/push would fail with an opaque 403. ──
      - name: Preflight — FLEET_SYNC_TOKEN present
        if: steps.resolve.outputs.skip != 'true'
        env:
          FLEET_SYNC_TOKEN: ${{ secrets.FLEET_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FLEET_SYNC_TOKEN:-}" ]; then
            echo "::error::FLEET_SYNC_TOKEN secret is not set."
            echo "::error::This workflow pushes sync branches and opens PRs in the OS repos,"
            echo "::error::which the built-in GITHUB_TOKEN cannot reach. Create a fine-grained"
            echo "::error::PAT or GitHub App token with contents:write + pull-requests:write on"
            echo "::error::the dotfiles-* OS repos and save it as the FLEET_SYNC_TOKEN secret."
            exit 1
          fi

      # Core is checked out AT THE TAG into a sibling layout (fleet/dotfiles-core) so
      # sync-core.sh's default REPOS_ROOT (the parent of its own repo) resolves to
      # fleet/, beside the OS clones. Full history: git subtree needs it.
      - name: Check out Core at the released tag
        if: steps.resolve.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.resolve.outputs.tag }}
          fetch-depth: 0
          path: fleet/dotfiles-core

      # The audit gate inside sync-core.sh runs scripts/audit-core.sh --quiet (NOT
      # --strict), so a missing linter SKIPs rather than fails. We install the cheap,
      # high-value subset (shellcheck + zsh for syntax/behavioral, PyYAML for the YAML
      # gate); luacheck/markdownlint/actionlint/nvim skip gracefully and were already
      # enforced on the tagged commit by ci.yml before the tag could exist.
      - name: Install the audit toolchain
        if: steps.resolve.outputs.skip != 'true'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck zsh python3-yaml

      - name: Configure git + fleet auth
        if: steps.resolve.outputs.skip != 'true'
        env:
          FLEET_SYNC_TOKEN: ${{ secrets.FLEET_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "dotfiles-core sync bot"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Authenticate every github.com https fetch/clone/push with the fleet token.
          git config --global \
            url."https://x-access-token:${FLEET_SYNC_TOKEN}@github.com/".insteadOf \
            "https://github.com/"

      - name: Fan out Core and open PRs
        if: steps.resolve.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.FLEET_SYNC_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          TAG: ${{ steps.resolve.outputs.tag }}
          REPOS_INPUT: ${{ github.event.inputs.repos }}
        run: |
          set -euo pipefail
          core="$GITHUB_WORKSPACE/fleet/dotfiles-core"
          root="$GITHUB_WORKSPACE/fleet"
          target_sha="$(git -C "$core" rev-parse HEAD)"
          short="${target_sha:0:12}"
          branch="sync/core-${TAG}"
          echo ":: fanning out Core $TAG ($short) on branch $branch"

          # Target fleet = scripts/os-repos.txt (the single source), or the dispatch subset.
          mapfile -t repos < <(sed -e 's/#.*//' -e '/^[[:space:]]*$/d' "$core/scripts/os-repos.txt")
          if [ -n "${REPOS_INPUT:-}" ]; then read -r -a repos <<< "$REPOS_INPUT"; fi
          echo ":: targets: ${repos[*]}"

          # Clone each OS repo beside Core and start a sync branch from its default tip.
          for r in "${repos[@]}"; do
            echo "::group::clone $r"
            git clone "https://github.com/${OWNER}/${r}.git" "$root/$r"
            git -C "$root/$r" checkout -B "$branch"
            echo "::endgroup::"
          done

          # ONE audit-gated fan-out for the whole fleet (sync-core.sh refuses to vendor
          # a red tree and stamps core.lock per repo), pinned to the released commit so
          # each core.lock records that exact commit + its tag.
          CORE_BRANCH="$target_sha" "$core/scripts/sync-core.sh" "${repos[@]}"

          # Per repo: push the branch and open a PR only when the sync actually produced
          # a commit AND core.lock now pins the released commit (post-condition check).
          summary="$RUNNER_TEMP/summary.md"; : > "$summary"
          fail=0
          for r in "${repos[@]}"; do
            path="$root/$r"
            default="$(git -C "$path" symbolic-ref --short refs/remotes/origin/HEAD | sed 's#^origin/##')"
            locked="$(grep -E '^core_sha=' "$path/core.lock" 2>/dev/null | cut -d= -f2 || true)"
            ahead="$(git -C "$path" rev-list --count "origin/${default}..HEAD" 2>/dev/null || echo 0)"

            if [ "$ahead" -eq 0 ]; then
              if [ "$locked" = "$target_sha" ]; then
                echo "- ✅ \`$r\` already at \`${TAG}\` — no PR needed" >> "$summary"
              else
                echo "- ❌ \`$r\` did not sync (core.lock \`${locked:0:12}\` != target \`$short\`)" >> "$summary"
                fail=1
              fi
              continue
            fi
            if [ "$locked" != "$target_sha" ]; then
              echo "- ❌ \`$r\` core.lock \`${locked:0:12}\` != target \`$short\` — not opening a PR" >> "$summary"
              fail=1
              continue
            fi

            git -C "$path" push --force-with-lease origin "HEAD:${branch}"
            open="$(gh pr list --repo "${OWNER}/${r}" --head "$branch" --state open --json url --jq 'length')"
            if [ "${open:-0}" != 0 ]; then
              url="$(gh pr list --repo "${OWNER}/${r}" --head "$branch" --state open --json url --jq '.[0].url')"
              echo "- 🔁 \`$r\` PR already open — pushed update: $url" >> "$summary"
            else
              cat > "$RUNNER_TEMP/pr-body.md" <<EOF
          Automated Core fan-out from \`dotfiles-core\` **${TAG}** (\`${short}\`).

          Vendors the released Core into \`core/\` via \`git subtree pull --squash\` and
          bumps \`core.lock\` to pin the exact released commit. Generated by
          dotfiles-core's \`sync-fanout\` workflow.

          Merge per the staged rollout in \`RELEASE-STRATEGY.md\` — canary
          \`dotfiles-MacBook\` first, bake, then the rest. **Review the diff before merging.**
          EOF
              url="$(gh pr create --repo "${OWNER}/${r}" --base "$default" --head "$branch" \
                --title "chore(core): sync Core → ${TAG}" \
                --body-file "$RUNNER_TEMP/pr-body.md")"
              echo "- 🚀 \`$r\` PR opened: $url" >> "$summary"
            fi
          done

          { echo "### Core fan-out → ${TAG} (\`${short}\`)"; echo; cat "$summary"; } >> "$GITHUB_STEP_SUMMARY"
          if [ "$fail" -ne 0 ]; then
            echo "::error::one or more repos failed to sync — see the job summary"
            exit 1
          fi
